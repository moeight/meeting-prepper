<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Prepper</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #080c14; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_BASE = window.location.hostname === "localhost" ? "http://localhost:5001" : "";

    // ── Supabase ───────────────────────────────────────────────────────────────
    // Replace these with your values from Supabase → Settings → API
    const SUPABASE_URL      = "https://tuyavpprivaxybzyuizy.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1eWF2cHByaXZheHlienl1aXp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTMwNDMsImV4cCI6MjA5MDg4OTA0M30.WurY5js3zkxldZF_yzfV0NdHNPcesUZLA98BoBgx3PQ";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const FREE_LIMIT = 3;

    const LOADING_STEPS = [
      "Scanning LinkedIn activity…",
      "Pulling recent articles and posts…",
      "Enriching company data…",
      "Analysing Instagram presence…",
      "Running bias framework…",
      "Building conversation cascades…",
      "Assembling your brief…",
    ];

    // ── Shared UI ──────────────────────────────────────────────────────────────
    const Badge = ({ label, color = "indigo" }) => {
      const colors = {
        indigo:  { bg: "rgba(99,102,241,0.15)",  text: "#a5b4fc", border: "rgba(99,102,241,0.3)"  },
        amber:   { bg: "rgba(245,158,11,0.15)",  text: "#fcd34d", border: "rgba(245,158,11,0.3)"  },
        emerald: { bg: "rgba(16,185,129,0.15)",  text: "#6ee7b7", border: "rgba(16,185,129,0.3)"  },
        red:     { bg: "rgba(239,68,68,0.15)",   text: "#fca5a5", border: "rgba(239,68,68,0.3)"   },
        slate:   { bg: "rgba(100,116,139,0.2)",  text: "#94a3b8", border: "rgba(100,116,139,0.3)" },
        cyan:    { bg: "rgba(6,182,212,0.15)",   text: "#67e8f9", border: "rgba(6,182,212,0.3)"   },
      };
      const c = colors[color] || colors.indigo;
      return (
        <span style={{ background: c.bg, color: c.text, border: `1px solid ${c.border}`, padding: "2px 8px", borderRadius: 5, fontSize: 11, fontWeight: 500, display: "inline-flex", alignItems: "center" }}>
          {label}
        </span>
      );
    };

    const SectionCard = ({ title, icon, accentColor = "#6366f1", children, tag }) => (
      <div style={{ borderRadius: 14, border: "1px solid rgba(255,255,255,0.07)", background: "rgba(255,255,255,0.025)", overflow: "hidden", marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px", borderBottom: "1px solid rgba(255,255,255,0.06)", borderLeft: `3px solid ${accentColor}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 15 }}>{icon}</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#fff", letterSpacing: "0.02em" }}>{title}</span>
          </div>
          {tag && <Badge label={tag} color="slate" />}
        </div>
        <div style={{ padding: "16px 20px" }}>{children}</div>
      </div>
    );

    // ── Sidebar ────────────────────────────────────────────────────────────────
    const Sidebar = ({ history, onSelectSearch, onNewBrief, activeId, searchCount }) => {
      const used = searchCount || 0;
      const remaining = Math.max(0, FREE_LIMIT - used);
      const pct = Math.min(100, (used / FREE_LIMIT) * 100);
      const barColor = remaining === 0 ? "#ef4444" : remaining === 1 ? "#f59e0b" : "#6366f1";

      return (
        <div style={{ width: 252, borderRight: "1px solid rgba(255,255,255,0.06)", background: "rgba(4,6,12,0.7)", display: "flex", flexDirection: "column", height: "100vh", position: "sticky", top: 0, flexShrink: 0 }}>
          {/* Logo */}
          <div style={{ padding: "18px 14px 10px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 30, height: 30, borderRadius: 9, background: "rgba(99,102,241,0.18)", border: "1px solid rgba(99,102,241,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>🧠</div>
              <span style={{ fontWeight: 700, fontSize: 13, color: "#fff", letterSpacing: "-0.02em" }}>Meeting Prepper</span>
            </div>
          </div>

          {/* New Brief button */}
          <div style={{ padding: "4px 10px 10px" }}>
            <button onClick={onNewBrief} style={{ width: "100%", padding: "9px 0", borderRadius: 10, fontSize: 12, fontWeight: 600, cursor: "pointer", background: "rgba(99,102,241,0.12)", color: "#a5b4fc", border: "1px solid rgba(99,102,241,0.25)", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
              <span>+</span> New Brief
            </button>
          </div>

          {/* Usage meter */}
          <div style={{ padding: "0 10px 10px" }}>
            <div style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: "8px 12px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ fontSize: 10, color: "#475569", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.07em" }}>Free briefs</span>
                <span style={{ fontSize: 10, fontWeight: 600, color: remaining === 0 ? "#f87171" : "#a5b4fc" }}>{used} / {FREE_LIMIT} used</span>
              </div>
              <div style={{ height: 4, background: "rgba(255,255,255,0.05)", borderRadius: 99, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${pct}%`, background: barColor, borderRadius: 99, transition: "width 0.4s ease" }} />
              </div>
            </div>
          </div>

          {/* History label */}
          {history.length > 0 && (
            <p style={{ fontSize: 10, fontWeight: 600, color: "#334155", textTransform: "uppercase", letterSpacing: "0.08em", margin: "4px 14px 6px" }}>Recent</p>
          )}

          {/* History list */}
          <div style={{ flex: 1, overflowY: "auto", padding: "0 8px" }}>
            {history.length === 0 ? (
              <p style={{ fontSize: 12, color: "#334155", textAlign: "center", marginTop: 24, padding: "0 12px", lineHeight: 1.65 }}>Your briefs will appear here after your first search.</p>
            ) : (
              history.map(item => (
                <button key={item.id} onClick={() => onSelectSearch(item)} style={{ width: "100%", textAlign: "left", padding: "8px 10px", borderRadius: 9, border: "none", background: activeId === item.id ? "rgba(99,102,241,0.12)" : "transparent", cursor: "pointer", marginBottom: 1, display: "block" }}>
                  <div style={{ fontSize: 12, fontWeight: 500, color: activeId === item.id ? "#a5b4fc" : "#cbd5e1", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.name}</div>
                  <div style={{ fontSize: 10, color: "#475569", marginTop: 2 }}>{item.company} · {new Date(item.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</div>
                </button>
              ))
            )}
          </div>

          {/* Sign out */}
          <div style={{ padding: "10px", borderTop: "1px solid rgba(255,255,255,0.05)" }}>
            <button onClick={() => supabase.auth.signOut()} style={{ width: "100%", padding: "8px 0", borderRadius: 9, fontSize: 12, color: "#475569", background: "none", border: "1px solid rgba(255,255,255,0.06)", cursor: "pointer" }}>Sign out</button>
          </div>
        </div>
      );
    };

    // ── Screen 0: Auth ─────────────────────────────────────────────────────────
    const AuthScreen = () => {
      const [mode,     setMode]     = useState("login");
      const [email,    setEmail]    = useState("");
      const [password, setPassword] = useState("");
      const [loading,  setLoading]  = useState(false);
      const [error,    setError]    = useState(null);
      const [message,  setMessage]  = useState(null);

      const inputStyle = { width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, padding: "10px 14px", fontSize: 13, color: "#e2e8f0", outline: "none", fontFamily: "inherit" };
      const labelStyle = { fontSize: 11, fontWeight: 500, color: "#94a3b8", marginBottom: 6, display: "block" };

      const handleEmailAuth = async () => {
        setLoading(true); setError(null); setMessage(null);
        const { error } = mode === "signup"
          ? await supabase.auth.signUp({ email, password })
          : await supabase.auth.signInWithPassword({ email, password });
        if (error) setError(error.message);
        else if (mode === "signup") setMessage("Account created! Check your email to confirm, then sign in.");
        setLoading(false);
      };

      const handleGoogle = async () => {
        await supabase.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo: window.location.origin },
        });
      };

      return (
        <div style={{ minHeight: "100vh", background: "#080c14", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ width: "100%", maxWidth: 400 }}>
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ width: 48, height: 48, borderRadius: 14, background: "rgba(99,102,241,0.18)", border: "1px solid rgba(99,102,241,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, margin: "0 auto 16px" }}>🧠</div>
              <h1 style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-0.03em", margin: "0 0 6px" }}>Meeting Prepper</h1>
              <p style={{ fontSize: 13, color: "#475569", margin: 0 }}>{mode === "login" ? "Sign in to your account" : "Create your account"}</p>
            </div>

            <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: 24 }}>
              <div style={{ marginBottom: 14 }}>
                <label style={labelStyle}>Email</label>
                <input style={inputStyle} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" onKeyDown={e => e.key === "Enter" && handleEmailAuth()} />
              </div>
              <div style={{ marginBottom: 20 }}>
                <label style={labelStyle}>Password</label>
                <input style={inputStyle} type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key === "Enter" && handleEmailAuth()} />
              </div>

              {error   && <p style={{ fontSize: 12, color: "#f87171", margin: "0 0 14px" }}>{error}</p>}
              {message && <p style={{ fontSize: 12, color: "#34d399", margin: "0 0 14px" }}>{message}</p>}

              <button onClick={handleEmailAuth} disabled={loading || !email || !password} style={{ width: "100%", padding: "13px 0", borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: loading || !email || !password ? "default" : "pointer", background: loading || !email || !password ? "rgba(255,255,255,0.04)" : "#4f46e5", color: loading || !email || !password ? "#475569" : "#fff", border: loading || !email || !password ? "1px solid rgba(255,255,255,0.06)" : "none", marginBottom: 12, boxShadow: loading || !email || !password ? "none" : "0 4px 20px rgba(99,102,241,0.25)" }}>
                {loading ? "Loading…" : mode === "login" ? "Sign in" : "Create account"}
              </button>

              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <div style={{ flex: 1, height: 1, background: "rgba(255,255,255,0.07)" }} />
                <span style={{ fontSize: 11, color: "#475569" }}>or</span>
                <div style={{ flex: 1, height: 1, background: "rgba(255,255,255,0.07)" }} />
              </div>

              <button onClick={handleGoogle} style={{ width: "100%", padding: "13px 0", borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: "pointer", background: "rgba(255,255,255,0.04)", color: "#e2e8f0", border: "1px solid rgba(255,255,255,0.1)", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
              </button>
            </div>

            <p style={{ textAlign: "center", fontSize: 12, color: "#475569", marginTop: 16 }}>
              {mode === "login" ? "Don't have an account? " : "Already have an account? "}
              <button onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(null); setMessage(null); }} style={{ background: "none", border: "none", color: "#a5b4fc", cursor: "pointer", fontSize: 12, fontWeight: 500, padding: 0 }}>
                {mode === "login" ? "Sign up" : "Sign in"}
              </button>
            </p>
          </div>
        </div>
      );
    };

    // ── Screen: Pending Approval ───────────────────────────────────────────────
    const PendingScreen = () => (
      <div style={{ minHeight: "100vh", background: "#080c14", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
        <div style={{ width: "100%", maxWidth: 420, textAlign: "center" }}>
          <div style={{ width: 56, height: 56, borderRadius: 16, background: "rgba(245,158,11,0.12)", border: "1px solid rgba(245,158,11,0.25)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, margin: "0 auto 20px" }}>⏳</div>
          <h2 style={{ fontSize: 20, fontWeight: 700, color: "#fff", margin: "0 0 10px", letterSpacing: "-0.02em" }}>Access Pending</h2>
          <p style={{ fontSize: 13, color: "#64748b", lineHeight: 1.65, margin: "0 0 6px" }}>Your account is awaiting approval.</p>
          <p style={{ fontSize: 13, color: "#475569", lineHeight: 1.65, margin: "0 0 28px" }}>You'll receive access once your request has been reviewed. This usually happens within 24 hours.</p>
          <button onClick={() => supabase.auth.signOut()} style={{ fontSize: 12, color: "#475569", background: "none", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 9, padding: "9px 18px", cursor: "pointer" }}>Sign out</button>
        </div>
      </div>
    );

    // ── Screen: Limit Reached ──────────────────────────────────────────────────
    const LimitScreen = ({ history, onSelectSearch }) => (
      <div style={{ display: "flex", height: "100vh", background: "#080c14", overflow: "hidden" }}>
        <Sidebar history={history} onSelectSearch={onSelectSearch} onNewBrief={() => {}} activeId={null} searchCount={FREE_LIMIT} />
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ width: "100%", maxWidth: 420, textAlign: "center" }}>
            <div style={{ width: 56, height: 56, borderRadius: 16, background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, margin: "0 auto 20px" }}>🔒</div>
            <h2 style={{ fontSize: 20, fontWeight: 700, color: "#fff", margin: "0 0 10px", letterSpacing: "-0.02em" }}>Free trial complete</h2>
            <p style={{ fontSize: 13, color: "#64748b", lineHeight: 1.65, margin: "0 0 8px" }}>You've used all {FREE_LIMIT} of your free briefs.</p>
            <p style={{ fontSize: 13, color: "#475569", lineHeight: 1.65, margin: 0 }}>Your previous briefs are still accessible on the left. To continue generating new ones, reach out to get full access.</p>
          </div>
        </div>
      </div>
    );

    // ── Screen 1: Form ─────────────────────────────────────────────────────────
    const FormScreen = ({ onSubmit, searchCount }) => {
      const [meetingType, setMeetingType] = useState("Sales Pitch");
      const [timeAvail,   setTimeAvail]   = useState("24hr");
      const [isFollowUp,  setIsFollowUp]  = useState(false);
      const [name,        setName]        = useState("");
      const [company,     setCompany]     = useState("");
      const [role,        setRole]        = useState("");
      const [linkedin,    setLinkedin]    = useState("");
      const [instagram,   setInstagram]   = useState("");
      const [website,     setWebsite]     = useState("");
      const [context,     setContext]     = useState("");
      const [prevAttendees, setPrevAttendees] = useState("");
      const [prevAnchored,  setPrevAnchored]  = useState("");

      const completePct = Math.round(
        ([name, company].filter(Boolean).length / 2) * 35 +
        (linkedin.trim()  ? 20 : 0) +
        (instagram.trim() ? 20 : 0) +
        (website.trim()   ? 10 : 0) +
        (context.trim()   ? 15 : 0)
      );
      const barColor = completePct >= 80 ? "#10b981" : completePct >= 50 ? "#f59e0b" : "#6366f1";

      const TYPES = ["Sales Pitch", "Investor Meeting", "Partnership", "Job Interview"];
      const EMOJIS = { "Sales Pitch": "💼", "Investor Meeting": "📈", "Partnership": "🤝", "Job Interview": "🎯" };
      const TIMES  = [
        { v: "5min",  l: "< 5 min",  s: "Quick Fire"  },
        { v: "1hr",   l: "1–4 hrs",  s: "Focused"     },
        { v: "8hr",   l: "4–12 hrs", s: "Strategic"   },
        { v: "24hr",  l: "24+ hrs",  s: "Full Intel"  },
      ];

      const inputStyle = { width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, padding: "10px 14px", fontSize: 13, color: "#e2e8f0", outline: "none", fontFamily: "inherit" };
      const labelStyle = { fontSize: 11, fontWeight: 500, color: "#94a3b8", marginBottom: 6, display: "block" };
      const canGenerate = name.trim() && company.trim() && linkedin.trim() && instagram.trim() && context.trim();
      const remaining = Math.max(0, FREE_LIMIT - (searchCount || 0));

      const handleSubmit = () => {
        if (!canGenerate) return;
        onSubmit({ name, company, role, linkedin, instagram, website, context, meetingType, timeAvail, isFollowUp, prevAttendees, prevAnchored });
      };

      return (
        <div style={{ minHeight: "100vh", background: "#080c14", color: "#fff" }}>
          <div style={{ display: "flex", justifyContent: "center", padding: "40px 16px" }}>
            <div style={{ width: "100%", maxWidth: 520 }}>
              <h1 style={{ fontSize: 22, fontWeight: 700, color: "#fff", letterSpacing: "-0.03em", margin: "0 0 4px" }}>New Meeting Brief</h1>
              <p style={{ fontSize: 13, color: "#475569", margin: "0 0 28px" }}>Build your intelligence dossier before you walk in the room.</p>

              {/* Meeting Type */}
              <div style={{ marginBottom: 24 }}>
                <label style={labelStyle}>Meeting Type</label>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                  {TYPES.map(t => (
                    <button key={t} onClick={() => setMeetingType(t)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "12px 8px", borderRadius: 12, border: `1px solid ${meetingType === t ? "rgba(99,102,241,0.5)" : "rgba(255,255,255,0.07)"}`, background: meetingType === t ? "rgba(99,102,241,0.12)" : "rgba(255,255,255,0.025)", color: meetingType === t ? "#a5b4fc" : "#94a3b8", fontSize: 11, fontWeight: 500, cursor: "pointer" }}>
                      <span style={{ fontSize: 18 }}>{EMOJIS[t]}</span>{t}
                    </button>
                  ))}
                </div>
              </div>

              {/* Time Available */}
              <div style={{ marginBottom: 24 }}>
                <label style={labelStyle}>Time Available to Prepare</label>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                  {TIMES.map(t => (
                    <button key={t.v} onClick={() => setTimeAvail(t.v)} style={{ padding: "12px 8px", borderRadius: 12, textAlign: "center", cursor: "pointer", border: `1px solid ${timeAvail === t.v ? "rgba(99,102,241,0.5)" : "rgba(255,255,255,0.07)"}`, background: timeAvail === t.v ? "rgba(99,102,241,0.12)" : "rgba(255,255,255,0.025)" }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: timeAvail === t.v ? "#a5b4fc" : "#cbd5e1" }}>{t.l}</div>
                      <div style={{ fontSize: 10, marginTop: 2, color: timeAvail === t.v ? "rgba(165,180,252,0.7)" : "#475569" }}>{t.s}</div>
                    </button>
                  ))}
                </div>
              </div>

              {/* Person Info */}
              <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: 20, marginBottom: 16 }}>
                <p style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", margin: "0 0 16px" }}>Person Info</p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                  <div><label style={labelStyle}>Full Name <span style={{ color: "#a5b4fc" }}>*</span></label><input style={inputStyle} value={name} onChange={e => setName(e.target.value)} placeholder="Arjun Mehta" /></div>
                  <div><label style={labelStyle}>Company <span style={{ color: "#a5b4fc" }}>*</span></label><input style={inputStyle} value={company} onChange={e => setCompany(e.target.value)} placeholder="Kintsugi Labs" /></div>
                </div>
                <div style={{ marginBottom: 12 }}><label style={labelStyle}>Role / Title <span style={{ color: "#475569", fontWeight: 400 }}>optional</span></label><input style={inputStyle} value={role} onChange={e => setRole(e.target.value)} placeholder="Co-founder & CEO" /></div>
                <div style={{ marginBottom: 12 }}><label style={labelStyle}>LinkedIn URL <span style={{ color: "#a5b4fc" }}>*</span></label><input style={inputStyle} value={linkedin} onChange={e => setLinkedin(e.target.value)} placeholder="linkedin.com/in/username" /></div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div><label style={labelStyle}>Instagram URL <span style={{ color: "#a5b4fc" }}>*</span></label><input style={inputStyle} value={instagram} onChange={e => setInstagram(e.target.value)} placeholder="instagram.com/username" /></div>
                  <div><label style={labelStyle}>Company Website <span style={{ color: "#475569", fontWeight: 400 }}>optional</span></label><input style={inputStyle} value={website} onChange={e => setWebsite(e.target.value)} placeholder="kintsugi.com" /></div>
                </div>
              </div>

              {/* Meeting Context */}
              <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: 20, marginBottom: 16 }}>
                <p style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", margin: "0 0 16px" }}>Meeting Context</p>
                <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                  {["First Meeting", "Follow-up"].map(opt => {
                    const active = isFollowUp ? opt === "Follow-up" : opt === "First Meeting";
                    return <button key={opt} onClick={() => setIsFollowUp(opt === "Follow-up")} style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: `1px solid ${active ? "rgba(99,102,241,0.5)" : "rgba(255,255,255,0.07)"}`, background: active ? "rgba(99,102,241,0.12)" : "rgba(255,255,255,0.025)", color: active ? "#a5b4fc" : "#94a3b8", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>{opt === "First Meeting" ? "🆕 First Meeting" : "🔁 Follow-up"}</button>;
                  })}
                </div>
                {isFollowUp && (
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ marginBottom: 12 }}><label style={labelStyle}>Who attended last time?</label><input style={inputStyle} value={prevAttendees} onChange={e => setPrevAttendees(e.target.value)} placeholder="e.g. Arjun + his Head of Growth" /></div>
                    <div style={{ marginBottom: 16 }}><label style={labelStyle}>What did you anchor on last time?</label><input style={inputStyle} value={prevAnchored} onChange={e => setPrevAnchored(e.target.value)} placeholder="e.g. Their bottleneck in scaling outbound" /></div>
                  </div>
                )}
                <div>
                  <label style={labelStyle}>Context <span style={{ color: "#a5b4fc" }}>*</span></label>
                  <textarea value={context} onChange={e => setContext(e.target.value)} placeholder="e.g. Introduced by a mutual contact. He mentioned pricing was a concern previously." rows={3} style={{ ...inputStyle, resize: "none" }} />
                </div>
              </div>

              {/* Intent Depth */}
              <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: 20, marginBottom: 20 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                  <span style={{ fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em" }}>Intent Depth</span>
                  <span style={{ fontSize: 11, fontWeight: 500, color: barColor }}>{completePct >= 80 ? "Excellent" : completePct >= 50 ? "Good" : "Basic"} · {completePct}%</span>
                </div>
                <div style={{ height: 6, background: "rgba(255,255,255,0.05)", borderRadius: 99, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${completePct}%`, background: barColor, borderRadius: 99, transition: "width 0.4s ease" }} />
                </div>
                {!website.trim() && <p style={{ fontSize: 11, color: "#475569", marginTop: 8, marginBottom: 0 }}>Add the company website for the richest possible analysis.</p>}
              </div>

              <button onClick={handleSubmit} disabled={!canGenerate} style={{ width: "100%", padding: "15px 0", borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: canGenerate ? "pointer" : "default", background: canGenerate ? "#4f46e5" : "rgba(255,255,255,0.04)", color: canGenerate ? "#fff" : "#475569", border: canGenerate ? "none" : "1px solid rgba(255,255,255,0.06)", boxShadow: canGenerate ? "0 4px 24px rgba(99,102,241,0.25)" : "none" }}>
                {canGenerate ? `🧠 Generate Meeting Brief (${remaining} free ${remaining === 1 ? "brief" : "briefs"} left)` : "Fill in all required fields to continue"}
              </button>
              <p style={{ textAlign: "center", fontSize: 11, color: "#334155", marginTop: 10 }}>Research takes ~20–40 seconds depending on data availability.</p>
            </div>
          </div>
        </div>
      );
    };

    // ── Screen 2: Loading ──────────────────────────────────────────────────────
    const LoadingScreen = ({ error }) => {
      const [step, setStep] = useState(0);

      useEffect(() => {
        if (error || step >= LOADING_STEPS.length) return;
        const t = setTimeout(() => setStep(s => s + 1), 800);
        return () => clearTimeout(t);
      }, [step, error]);

      return (
        <div style={{ minHeight: "100vh", background: "#080c14", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ width: "100%", maxWidth: 360, textAlign: "center" }}>
            <div style={{ width: 56, height: 56, borderRadius: 16, background: "rgba(99,102,241,0.15)", border: "1px solid rgba(99,102,241,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, margin: "0 auto 20px" }}>
              {error ? "⚠️" : "🧠"}
            </div>
            {error ? (
              <div>
                <h2 style={{ fontSize: 18, fontWeight: 700, color: "#fff", margin: "0 0 8px" }}>Something went wrong</h2>
                <p style={{ fontSize: 13, color: "#ef4444", margin: "0 0 4px" }}>{error}</p>
                <p style={{ fontSize: 12, color: "#475569" }}>Check your API keys in .env and try again.</p>
              </div>
            ) : (
              <div>
                <h2 style={{ fontSize: 20, fontWeight: 700, color: "#fff", margin: "0 0 6px", letterSpacing: "-0.02em" }}>Building your brief…</h2>
                <p style={{ fontSize: 13, color: "#475569", margin: "0 0 32px" }}>Scanning public data and running analysis.</p>
                <div style={{ textAlign: "left", marginBottom: 24 }}>
                  {LOADING_STEPS.map((s, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12, opacity: i < step ? 1 : 0.2, transition: "opacity 0.3s" }}>
                      <div style={{ width: 20, height: 20, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 10, background: i < step ? "rgba(16,185,129,0.2)" : "rgba(255,255,255,0.04)", color: i < step ? "#34d399" : "#475569", border: `1px solid ${i < step ? "rgba(16,185,129,0.3)" : "rgba(255,255,255,0.06)"}` }}>
                        {i < step ? "✓" : "·"}
                      </div>
                      <span style={{ fontSize: 13, color: i < step ? "#cbd5e1" : "#475569" }}>{s}</span>
                    </div>
                  ))}
                </div>
                <div style={{ height: 4, background: "rgba(255,255,255,0.05)", borderRadius: 99, overflow: "hidden" }}>
                  <div style={{ height: "100%", background: "#6366f1", borderRadius: 99, width: `${(step / LOADING_STEPS.length) * 100}%`, transition: "width 0.6s ease" }} />
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ── Screen 3: Brief ────────────────────────────────────────────────────────
    const BriefScreen = ({ brief, inputs, onReset }) => {
      const [view, setView] = useState(inputs?.timeAvail === "5min" ? "quick" : "full");

      const urgencyMap = {
        hot:    { dot: "#f87171", label: "Hot signal", badge: "red"    },
        medium: { dot: "#fbbf24", label: "Noteworthy", badge: "amber"  },
        watch:  { dot: "#94a3b8", label: "Watch",      badge: "slate"  },
      };

      const p = brief.person || {};
      const qualityColor = brief.data_quality === "high" ? "#34d399" : brief.data_quality === "medium" ? "#fbbf24" : "#94a3b8";

      const nameWords = (inputs?.name || "").toLowerCase().split(/\s+/).filter(w => w.length > 1);
      const briefPersonName = (p.name || "").toLowerCase();
      const nameMismatch = nameWords.length > 0 && !nameWords.some(w => briefPersonName.includes(w));

      return (
        <div style={{ minHeight: "100vh", background: "#080c14", color: "#fff" }}>
          {/* Sticky top bar */}
          <div style={{ position: "sticky", top: 0, zIndex: 20, borderBottom: "1px solid rgba(255,255,255,0.06)", background: "rgba(8,12,20,0.95)", backdropFilter: "blur(12px)", padding: "10px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <button onClick={onReset} style={{ fontSize: 12, color: "#64748b", background: "none", border: "none", cursor: "pointer", padding: 0 }}>← New Brief</button>
              <div style={{ width: 1, height: 16, background: "rgba(255,255,255,0.08)" }} />
              <div style={{ width: 32, height: 32, borderRadius: "50%", background: "rgba(99,102,241,0.2)", border: "1px solid rgba(99,102,241,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#a5b4fc" }}>{p.initials || "?"}</div>
              <div>
                <span style={{ fontSize: 13, fontWeight: 600, color: "#fff" }}>{p.name}</span>
                <span style={{ fontSize: 11, color: "#64748b", marginLeft: 6 }}>{p.role} · {p.company}</span>
              </div>
              <Badge label={brief.meetingType || inputs?.meetingType} color="indigo" />
              <span style={{ fontSize: 11, color: qualityColor }}>● {brief.data_quality} quality</span>
            </div>
            <div style={{ display: "flex", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, padding: 3 }}>
              {[{ v: "quick", l: "⚡ 5-Min Brief" }, { v: "full", l: "📋 Full Brief" }].map(({ v, l }) => (
                <button key={v} onClick={() => setView(v)} style={{ padding: "6px 12px", borderRadius: 8, fontSize: 11, fontWeight: 500, cursor: "pointer", border: "none", background: view === v ? "rgba(99,102,241,0.2)" : "transparent", color: view === v ? "#a5b4fc" : "#64748b" }}>{l}</button>
              ))}
            </div>
          </div>

          {nameMismatch && (
            <div style={{ background: "rgba(245,158,11,0.08)", borderBottom: "1px solid rgba(245,158,11,0.2)", padding: "10px 24px", display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 15 }}>⚠️</span>
              <p style={{ fontSize: 12, color: "#fcd34d", margin: 0, lineHeight: 1.5 }}>
                <strong>Name mismatch detected.</strong> The name you entered ("{inputs?.name}") doesn't match the profile data we found ("{p.name}"). Please ensure this is the correct person before your meeting.
              </p>
            </div>
          )}

          <div style={{ maxWidth: 700, margin: "0 auto", padding: "32px 24px" }}>

            {/* ── Quick Fire ── */}
            {view === "quick" && (
              <div className="fade-in">
                <h2 style={{ fontSize: 18, fontWeight: 700, color: "#fff", margin: "0 0 4px" }}>⚡ 5-Minute Brief</h2>
                <p style={{ fontSize: 12, color: "#475569", margin: "0 0 20px" }}>The {(brief.quick_fire || []).length} things that matter most before you walk in.</p>
                <div style={{ background: "rgba(245,158,11,0.06)", border: "1px solid rgba(245,158,11,0.18)", borderRadius: 14, padding: 20, marginBottom: 16 }}>
                  {(brief.quick_fire || []).map((item, i) => (
                    <div key={i} style={{ display: "flex", gap: 12, marginBottom: i < (brief.quick_fire.length - 1) ? 14 : 0 }}>
                      <span style={{ color: "#fbbf24", fontWeight: 700, fontSize: 13, width: 20, flexShrink: 0 }}>{i + 1}.</span>
                      <p style={{ fontSize: 13, color: "#e2e8f0", lineHeight: 1.6, margin: 0 }}>{item}</p>
                    </div>
                  ))}
                </div>
                {(brief.cascades || []).length > 0 && (
                  <div style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: 20 }}>
                    <p style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", margin: "0 0 10px" }}>Best opening question</p>
                    <p style={{ fontSize: 13, color: "#e2e8f0", fontStyle: "italic", lineHeight: 1.65, margin: "0 0 10px" }}>{brief.cascades[0].opening}</p>
                    <p style={{ fontSize: 12, color: "#64748b", margin: 0, lineHeight: 1.5 }}>{brief.cascades[0].thread}</p>
                  </div>
                )}
              </div>
            )}

            {/* ── Full Brief ── */}
            {view === "full" && (
              <div className="fade-in">
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
                  <div>
                    <h2 style={{ fontSize: 18, fontWeight: 700, color: "#fff", margin: "0 0 4px" }}>Full Intel Brief</h2>
                    <p style={{ fontSize: 12, color: "#475569", margin: 0 }}>Pre-meeting dossier · {brief.meetingType}</p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 11, color: "#334155" }}>Generated</div>
                    <div style={{ fontSize: 11, color: "#64748b" }}>Today · {inputs?.timeAvail} mode</div>
                  </div>
                </div>

                {/* 1. Common Ground */}
                {(brief.confirmation_bias || []).length > 0 && (
                  <SectionCard title="Common Ground" icon="🤝" accentColor="#6366f1" tag="Priority 1">
                    {brief.confirmation_bias.map((item, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: i < brief.confirmation_bias.length - 1 ? 14 : 0 }}>
                        <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: item.strength === "high" ? "#34d399" : item.strength === "medium" ? "#fbbf24" : "#94a3b8", flexShrink: 0, marginTop: 5 }} />
                        <div>
                          <p style={{ fontSize: 13, color: "#e2e8f0", margin: "0 0 5px", lineHeight: 1.5 }}>{item.label}</p>
                          <Badge label={item.type} color={item.type === "Region" ? "cyan" : item.type === "Sports" ? "amber" : item.type === "Education" ? "indigo" : "emerald"} />
                        </div>
                      </div>
                    ))}
                  </SectionCard>
                )}

                {/* 2. What's On Their Mind */}
                {(brief.recency_signals || []).length > 0 && (
                  <SectionCard title="What's On Their Mind" icon="📡" accentColor="#f59e0b" tag="Priority 2">
                    {brief.recency_signals.map((item, i) => {
                      const s = urgencyMap[item.urgency] || urgencyMap.watch;
                      return (
                        <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: i < brief.recency_signals.length - 1 ? 14 : 0 }}>
                          <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: s.dot, flexShrink: 0, marginTop: 5 }} />
                          <p style={{ fontSize: 13, color: "#e2e8f0", margin: 0, lineHeight: 1.5, flex: 1 }}>{item.signal}</p>
                          <Badge label={s.label} color={s.badge} />
                        </div>
                      );
                    })}
                  </SectionCard>
                )}

                {/* 3. Who They Listen To */}
                {(brief.authority_anchors || []).length > 0 && (
                  <SectionCard title="Who They Listen To" icon="⭐" accentColor="#8b5cf6" tag="Priority 3">
                    <p style={{ fontSize: 12, color: "#64748b", margin: "0 0 12px", lineHeight: 1.5 }}>People they reference and look up to. Work these names naturally into the conversation.</p>
                    {brief.authority_anchors.map((a, i) => (
                      <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: i < brief.authority_anchors.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none" }}>
                        <span style={{ fontSize: 13, fontWeight: 500, color: "#e2e8f0" }}>{a.name}</span>
                        <span style={{ fontSize: 12, color: "#64748b", fontStyle: "italic" }}>{a.theme}</span>
                      </div>
                    ))}
                  </SectionCard>
                )}

                {/* 4. Their World */}
                {(brief.ingroup_markers || []).length > 0 && (
                  <SectionCard title="Their World" icon="🏛️" accentColor="#06b6d4" tag="Priority 4">
                    <p style={{ fontSize: 12, color: "#64748b", margin: "0 0 12px", lineHeight: 1.5 }}>Communities, circles, and identity signals that shape how they see the world.</p>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                      {brief.ingroup_markers.map((m, i) => (
                        <div key={i} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: "8px 12px", fontSize: 12, color: "#cbd5e1" }}>{m}</div>
                      ))}
                    </div>
                  </SectionCard>
                )}

                {/* 5. What They're Protecting */}
                {(brief.loss_aversion || []).length > 0 && (
                  <SectionCard title="What They're Protecting" icon="🛡️" accentColor="#ef4444" tag="Priority 5">
                    <p style={{ fontSize: 12, color: "#64748b", margin: "0 0 14px", lineHeight: 1.5 }}>What they're working hard to protect. Frame your pitch around reinforcing these priorities.</p>
                    {brief.loss_aversion.map((item, i) => (
                      <div key={i} style={{ borderLeft: "2px solid rgba(239,68,68,0.3)", paddingLeft: 12, marginBottom: i < brief.loss_aversion.length - 1 ? 16 : 0 }}>
                        <p style={{ fontSize: 13, fontWeight: 500, color: "#e2e8f0", margin: "0 0 4px", lineHeight: 1.5 }}>{item.fear}</p>
                        <p style={{ fontSize: 12, color: "#64748b", margin: 0 }}>→ {item.implication}</p>
                      </div>
                    ))}
                  </SectionCard>
                )}

                {/* 6. Conversation Starters */}
                {(brief.cascades || []).length > 0 && (
                  <SectionCard title="Conversation Starters" icon="💬" accentColor="#10b981">
                    <p style={{ fontSize: 12, color: "#64748b", margin: "0 0 16px", lineHeight: 1.5 }}>Opening questions rooted in real research that lead naturally into the heart of the conversation.</p>
                    {brief.cascades.map((c, i) => (
                      <div key={c.id} style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: 16, marginBottom: i < brief.cascades.length - 1 ? 12 : 0 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                          <span style={{ fontSize: 10, fontWeight: 600, color: "#34d399", textTransform: "uppercase", letterSpacing: "0.08em" }}>Cascade {c.id} · {c.seed}</span>
                          <Badge label={c.strength === "high" ? "Strong angle" : "Good opener"} color={c.strength === "high" ? "emerald" : "amber"} />
                        </div>
                        <div style={{ marginBottom: 10 }}>
                          <p style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.07em", margin: "0 0 6px" }}>Opening question</p>
                          <p style={{ fontSize: 13, color: "#e2e8f0", fontStyle: "italic", lineHeight: 1.65, margin: 0 }}>{c.opening}</p>
                        </div>
                        <div style={{ marginBottom: 10 }}>
                          <p style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.07em", margin: "0 0 6px" }}>Where it leads</p>
                          <p style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.55, margin: 0 }}>{c.thread}</p>
                        </div>
                        <div style={{ background: "rgba(16,185,129,0.06)", border: "1px solid rgba(16,185,129,0.18)", borderRadius: 8, padding: "8px 12px" }}>
                          <p style={{ fontSize: 12, color: "#6ee7b7", margin: 0, lineHeight: 1.5 }}>Bridge → {c.bridge}</p>
                        </div>
                      </div>
                    ))}
                  </SectionCard>
                )}

                {/* 7. Their Voice & Style */}
                {brief.content_analysis && (
                  <SectionCard title="Their Voice & Style" icon="✍️" accentColor="#f97316">
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                      <div style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: 14, textAlign: "center" }}>
                        <div style={{ fontSize: 20, fontWeight: 700, color: "#fdba74" }}>{brief.content_analysis.frequency}</div>
                        <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>posting cadence</div>
                      </div>
                      <div style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: "#e2e8f0", textAlign: "center" }}>{brief.content_analysis.assessment}</div>
                      </div>
                    </div>
                    {(brief.content_analysis.themes || []).length > 0 && (
                      <div style={{ marginBottom: 12 }}>
                        <p style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.07em", margin: "0 0 8px" }}>Recurring themes</p>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                          {brief.content_analysis.themes.map(t => <Badge key={t} label={t} color="slate" />)}
                        </div>
                      </div>
                    )}
                    <div style={{ marginBottom: 12 }}>
                      <p style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.07em", margin: "0 0 6px" }}>Style · how to communicate with them</p>
                      <p style={{ fontSize: 13, color: "#cbd5e1", lineHeight: 1.6, margin: 0 }}>{brief.content_analysis.style}</p>
                    </div>
                    {brief.content_analysis.sponsored && brief.content_analysis.sponsoredNote && (
                      <div style={{ display: "flex", gap: 8, background: "rgba(245,158,11,0.06)", border: "1px solid rgba(245,158,11,0.18)", borderRadius: 10, padding: "10px 12px" }}>
                        <span style={{ color: "#fbbf24", fontSize: 12 }}>💰</span>
                        <p style={{ fontSize: 12, color: "rgba(253,186,116,0.85)", margin: 0, lineHeight: 1.5 }}><strong>Sponsored content detected.</strong> {brief.content_analysis.sponsoredNote}</p>
                      </div>
                    )}
                  </SectionCard>
                )}

                {/* 8. Your Best Hook */}
                {brief.anchor && (
                  <SectionCard title="Your Best Hook" icon="⚓" accentColor="#6366f1">
                    <div style={{ marginBottom: 16 }}>
                      <p style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.07em", margin: "0 0 10px" }}>Your Main Anchor</p>
                      <div style={{ background: "rgba(99,102,241,0.08)", border: "1px solid rgba(99,102,241,0.22)", borderRadius: 12, padding: 16 }}>
                        <p style={{ fontSize: 13, color: "#c7d2fe", lineHeight: 1.65, margin: 0, fontWeight: 500 }}>{brief.anchor.main}</p>
                      </div>
                    </div>
                    <div>
                      <p style={{ fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.07em", margin: "0 0 8px" }}>Social Proof</p>
                      <p style={{ fontSize: 13, color: "#cbd5e1", lineHeight: 1.6, margin: 0 }}>{brief.anchor.social_proof}</p>
                    </div>
                  </SectionCard>
                )}
              </div>
            )}
          </div>
        </div>
      );
    };

    // ── App Shell ──────────────────────────────────────────────────────────────
    const App = () => {
      const [session,        setSession]        = useState(undefined); // undefined = still checking
      const [profile,        setProfile]        = useState(null);
      const [profileLoading, setProfileLoading] = useState(false);
      const [history,        setHistory]        = useState([]);
      const [screen,         setScreen]         = useState("form");
      const [inputs,         setInputs]         = useState(null);
      const [briefData,      setBriefData]      = useState(null);
      const [activeBriefId,  setActiveBriefId]  = useState(null);
      const [error,          setError]          = useState(null);

      // Auth state listener
      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => setSession(session ?? null));
        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
          // Only wipe the session on an explicit sign-out.
          // TOKEN_REFRESHED and other transient events must NOT null the session,
          // otherwise switching windows causes a full unmount and wipes form state.
          if (event === "SIGNED_OUT") {
            setSession(null);
          } else if (session) {
            setSession(session);
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      // Load profile + history when session is available
      useEffect(() => {
        if (!session) { setProfile(null); setHistory([]); return; }
        setProfileLoading(true);
        supabase.from("profiles").select("*").eq("id", session.user.id).single()
          .then(({ data }) => { setProfile(data); setProfileLoading(false); });
      }, [session]);

      // Load search history once profile is approved
      useEffect(() => {
        if (!profile?.approved || !session) return;
        supabase.from("searches")
          .select("id, name, company, created_at, inputs, brief")
          .eq("user_id", session.user.id)
          .order("created_at", { ascending: false })
          .limit(50)
          .then(({ data }) => setHistory(data || []));
      }, [profile]);

      const handleSubmit = async (formInputs) => {
        setInputs(formInputs);
        setError(null);
        setScreen("loading");

        try {
          const res = await fetch(`${API_BASE}/api/brief`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formInputs),
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `Server error ${res.status}`);
          }

          const data = await res.json();

          // Save to Supabase + increment count (fire and forget — don't block the UI)
          const newCount = (profile?.search_count || 0) + 1;
          Promise.all([
            supabase.from("searches").insert({
              user_id: session.user.id,
              name: formInputs.name,
              company: formInputs.company,
              inputs: formInputs,
              brief: data,
            }).select("id, name, company, created_at, inputs, brief").single(),
            supabase.from("profiles").update({
              search_count: newCount,
              last_seen_at: new Date().toISOString(),
            }).eq("id", session.user.id),
          ]).then(([{ data: newItem }]) => {
            setProfile(p => ({ ...p, search_count: newCount }));
            if (newItem) {
              setHistory(prev => [newItem, ...prev]);
              setActiveBriefId(newItem.id);
            }
          });

          setBriefData(data);
          setScreen("brief");
        } catch (err) {
          setError(err.message || "Unknown error");
        }
      };

      const handleSelectSearch = (item) => {
        setInputs(item.inputs);
        setBriefData(item.brief);
        setActiveBriefId(item.id);
        setScreen("brief");
      };

      const handleNewBrief = () => {
        setBriefData(null);
        setActiveBriefId(null);
        setScreen("form");
      };

      // ── Render gates ──────────────────────────────────────────────────────────
      if (session === undefined) return null; // still doing the initial session check
      if (profileLoading && !profile) return null; // only blank-screen on the very first profile load
      if (!session) return <AuthScreen />;
      if (!profile?.approved) return <PendingScreen />;

      const searchCount = profile?.search_count || 0;
      const limitReached = searchCount >= FREE_LIMIT;

      // Loading screen is always full-width (no sidebar during generation)
      if (screen === "loading") return <LoadingScreen error={error} />;

      // Limit screen still shows history sidebar so users can re-read past briefs
      if (limitReached && screen !== "brief") {
        return <LimitScreen history={history} onSelectSearch={handleSelectSearch} />;
      }

      // Main layout: sidebar + content
      return (
        <div style={{ display: "flex", minHeight: "100vh", background: "#080c14" }}>
          <Sidebar
            history={history}
            onSelectSearch={handleSelectSearch}
            onNewBrief={handleNewBrief}
            activeId={activeBriefId}
            searchCount={searchCount}
          />
          <div style={{ flex: 1, overflowY: "auto", minWidth: 0 }}>
            {screen === "form"  && <FormScreen  onSubmit={handleSubmit} searchCount={searchCount} />}
            {screen === "brief" && briefData && <BriefScreen brief={briefData} inputs={inputs} onReset={handleNewBrief} />}
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
